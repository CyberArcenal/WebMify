<div class="error-page min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-gray-900 dark:to-gray-800">
  <div class="max-w-3xl w-full mx-4 p-8 text-center">
    <!-- Animated illustration -->
    <div class="relative mx-auto mb-10 w-64 h-64">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-48 h-48 rounded-full bg-blue-200 dark:bg-blue-900/50 flex items-center justify-center">
          <div class="w-32 h-32 rounded-full bg-blue-300 dark:bg-blue-800/60 flex items-center justify-center">
            <div class="w-16 h-16 rounded-full bg-blue-400 dark:bg-blue-700 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-white opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Floating elements -->
      <div class="absolute top-0 left-8 w-8 h-8 rounded-full bg-red-500 animate-bounce" style="animation-delay: 0.1s"></div>
      <div class="absolute top-4 right-6 w-6 h-6 rounded-full bg-yellow-500 animate-bounce" style="animation-delay: 0.3s"></div>
      <div class="absolute bottom-8 left-12 w-5 h-5 rounded-full bg-green-500 animate-bounce" style="animation-delay: 0.5s"></div>
      <div class="absolute bottom-4 right-10 w-7 h-7 rounded-full bg-purple-500 animate-bounce" style="animation-delay: 0.7s"></div>
    </div>

    <!-- Error code -->
    <div class="text-9xl font-bold text-gray-800 dark:text-white mb-2">
      <span class="text-blue-500">4</span>
      <span class="text-red-500">0</span>
      <span class="text-green-500">4</span>
    </div>
    
    <!-- Error message -->
    <h1 class="text-4xl md:text-5xl font-bold text-gray-800 dark:text-white mb-6">Page Not Found</h1>
    
    <div class="max-w-xl mx-auto">
      <p class="text-xl text-gray-600 dark:text-gray-300 mb-8">
        Oops! The page you're looking for doesn't exist or has been moved. 
        It might have been lost in the digital universe.
      </p>
      
      <div class="bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 dark:border-blue-400 p-4 rounded-lg mb-8">
        <p class="text-blue-800 dark:text-blue-200">
          <span class="font-semibold">Tip:</span> Check the URL for typos, or try navigating from the homepage.
        </p>
      </div>
    </div>
    
    <!-- Action buttons -->
    <div class="flex flex-wrap justify-center gap-4 mb-12">
      <a href="#index" class="px-8 py-4 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg shadow-lg transition-all duration-300 hover:-translate-y-1 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        Return to Homepage
      </a>
      
      <button id="go-back" class="px-8 py-4 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-800 dark:text-gray-200 font-medium rounded-lg shadow-lg transition-all duration-300 hover:-translate-y-1 flex items-center">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Go Back
      </button>
    </div>
    
    <!-- Search form -->
    <div class="max-w-xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-8">
      <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Looking for something specific?</h3>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input type="text" placeholder="Search the site..." class="w-full pl-10 pr-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:text-white">
      </div>
    </div>
    
    <!-- Site links -->
    <div class="flex flex-wrap justify-center gap-6">
      <a href="#projects" class="text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">Projects</a>
      <a href="#blog" class="text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">Blog</a>
      <a href="#about" class="text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">About</a>
      <a href="#skills" class="text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">Skills</a>
      <a href="#contact" class="text-gray-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 transition-colors">Contact</a>
    </div>
  </div>
</div>

<script>
  // Go back button functionality
  document.getElementById('go-back').addEventListener('click', () => {
    window.history.back();
  });
  
  // Add animation to the 404 text
  document.querySelectorAll('.error-page span').forEach((span, index) => {
    span.style.opacity = '0';
    span.style.transform = 'translateY(20px)';
    
    setTimeout(() => {
      span.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      span.style.opacity = '1';
      span.style.transform = 'translateY(0)';
    }, 300 + (index * 200));
  });
</script>

<style>
  .error-page {
    animation: fadeIn 0.8s ease-out;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }
  
  .animate-bounce {
    animation: bounce 2s infinite;
  }
</style>
