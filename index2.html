<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./public/portfolio.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Darius Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Darius Gabriel — Backend & Frontend Developer specializing in Django, React, and scalable architecture."
    />

    <meta property="og:title" content="Darius Portfolio" />
    <meta
      property="og:description"
      content="Showcasing my work in backend, frontend, and full-stack development."
    />
    <meta property="og:image" content="./public/portfolio.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://darius-portfollio.vercel.app" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Darius Portfolio" />
    <meta
      name="twitter:description"
      content="Showcasing my work in backend, frontend, and full-stack development."
    />
    <meta name="twitter:image" content="https://github.com/CyberArcenal/CyberArcenal/blob/main/assets/social%20icons/twitter.png?raw=true" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="/src/js/module/router.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .page-transition {
        transition: opacity 0.3s ease;
      }
      .router-link-active {
        position: relative;
      }
      .router-link-active::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 0;
        width: 100%;
        height: 2px;
        background-color: #0ea5e9;
        border-radius: 2px;
      }
      .dark .router-link-active::after {
        background-color: #7dd3fc;
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#f0f9ff",
                100: "#e0f2fe",
                200: "#bae6fd",
                300: "#7dd3fc",
                400: "#38bdf8",
                500: "#0ea5e9",
                600: "#0284c7",
                700: "#0369a1",
                800: "#075985",
                900: "#0c4a6e",
              },
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen"
  >
    <!-- Fixed Navigation Bar -->
    <header
      class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm shadow-sm"
    >
      <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <!-- Logo -->
          <div class="flex-shrink-0 flex items-center">
            <a
              href="#index"
              class="text-2xl font-bold text-primary-600 dark:text-primary-400"
              >Portfolio</a
            >
          </div>

          <!-- Desktop Navigation -->
          <div class="hidden md:flex items-center space-x-8">
            <a
              href="#index"
              class="router-link-active text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >Home</a
            >
            <a
              href="#about"
              class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >About</a
            >
            <a
              href="#projects"
              class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >Projects</a
            >
            <a
              href="#skills"
              class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >Skills</a
            >
            <a
              href="#blog"
              class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >Blog</a
            >
            <a
              href="#testimonials"
              class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >Testimonials</a
            >
            <a
              href="#contact"
              class="text-gray-700 dark:text-gray-300 hover:text-primary-600 dark:hover:text-primary-400 transition-colors font-medium"
              >Contact</a
            >
          </div>

          <!-- Right side controls -->
          <div class="flex items-center space-x-4">
            <!-- Dark mode toggle -->
            <button
              id="theme-toggle"
              class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors"
            >
              <i class="fa-solid fa-moon dark:hidden"></i>
              <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>

            <!-- Mobile menu button -->
            <button
              id="mobile-menu-button"
              class="md:hidden p-2 rounded-lg bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors"
            >
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>
        </div>
      </nav>

      <!-- Mobile Navigation -->
      <div
        id="mobile-menu"
        class="hidden md:hidden bg-white dark:bg-gray-800 shadow-lg"
      >
        <div class="px-2 pt-2 pb-3 space-y-1">
          <a
            href="#index"
            class="router-link-active block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >Home</a
          >
          <a
            href="#about"
            class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >About</a
          >
          <a
            href="#projects"
            class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >Projects</a
          >
          <a
            href="#skills"
            class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >Skills</a
          >
          <a
            href="#blog"
            class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >Blog</a
          >
          <a
            href="#testimonials"
            class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >Testimonials</a
          >
          <a
            href="#contact"
            class="block px-3 py-2 rounded-md text-base font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700"
            >Contact</a
          >
        </div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="app" class="page-transition pt-16 min-h-screen">
      <!-- Initial content will be replaced by router -->
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center py-20">
          <div class="flex justify-center mb-6">
            <div
              class="w-24 h-24 bg-gray-200 dark:bg-gray-700 rounded-full animate-pulse"
            ></div>
          </div>
          <h1 class="text-4xl font-bold text-gray-800 dark:text-white mb-4">
            Welcome to My Portfolio
          </h1>
          <p class="text-xl text-gray-600 dark:text-gray-300 max-w-2xl mx-auto">
            Loading content...
          </p>
          <div class="mt-8 flex justify-center">
            <div
              class="h-12 w-12 border-4 border-primary-500 border-t-transparent rounded-full animate-spin"
            ></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="bg-gray-100 dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="md:flex md:items-center md:justify-between">
          <div class="flex justify-center md:justify-start">
            <a
              href="#index"
              class="text-xl font-bold text-primary-600 dark:text-primary-400"
              >Portfolio</a
            >
          </div>
          <div class="mt-4 md:mt-0 flex justify-center">
            <div class="flex space-x-6">
              <a
                href="#"
                class="text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >
                <i class="fab fa-github fa-lg"></i>
              </a>
              <a
                href="#"
                class="text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >
                <i class="fab fa-linkedin fa-lg"></i>
              </a>
              <a
                href="#"
                class="text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >
                <i class="fab fa-twitter fa-lg"></i>
              </a>
              <a
                href="#"
                class="text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >
                <i class="fab fa-instagram fa-lg"></i>
              </a>
            </div>
          </div>
        </div>
        <div
          class="mt-8 text-center md:flex md:items-center md:justify-between"
        >
          <p class="text-sm text-gray-500 dark:text-gray-400">
            © 2025 My Portfolio. All rights reserved.
          </p>
          <div class="mt-4 md:mt-0 flex justify-center space-x-6">
            <a
              href="#privacy"
              class="text-sm text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >Privacy Policy</a
            >
            <a
              href="#terms"
              class="text-sm text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >Terms</a
            >
            <a
              href="#contact"
              class="text-sm text-gray-500 hover:text-primary-500 dark:text-gray-400 dark:hover:text-primary-400"
              >Contact</a
            >
          </div>
        </div>
      </div>
    </footer>
    <script type="module" src="/src/js/module/index.js"></script>
  </body>
</html>
